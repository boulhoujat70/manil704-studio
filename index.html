<!DOCTYPE html>
<html lang="fr">
<head>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
:root {
  --void: #050505;
  --deep: #0D0D0D;
  --hull: #121212;
  --cyan: #D4AF37; 
  --text: #E5E5E5;
  --text-bright: #FFFFFF;
  --wire: #332C1F;
  --danger: #FF3366;
}
body {
  font-family: 'Exo 2', sans-serif;
  background: var(--void);
  color: var(--text);
  height: 100%;
  display: flex;
  flex-direction: column;
  margin: 0;
}
#voanh-header {
  background: var(--deep);

  padding: 0 20px;
}
.brand-name {

  letter-spacing: 4px;
}
.hud-btn {
  background: var(--hull);
  border: 1px solid rgba(212,175,55,0.3);
  color: var(--cyan);
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
}
#chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 30px 20px;
  min-height: calc(100vh - 160px);
}
.welcome-banner {
  text-align: center;
  margin-top: 50px;
}
.wv-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 42px;
  font-weight: 900;
  color: var(--text-bright);

}
#input-area {
  background: var(--deep);
  border-top: 1px solid rgba(212,175,55,0.2);
  padding: 15px;
  display: flex;
  gap: 10px;
  align-items: center;
}
#user-input {
  flex: 1;
  background: var(--hull);
  border: 1px solid var(--wire);
  color: #fff;
  padding: 10px 15px;
  border-radius: 6px;
  outline: none;
}
.file-btn {
  background: var(--hull);
  border: 1px solid rgba(212,175,55,0.3);
  color: var(--cyan);
  font-size: 18px;
  width: 44px;
  height: 44px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
#send-btn {
  background: var(--cyan);
  color: #000;
  font-weight: 700;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
}
.file-preview {
  background: #1a1a1a;
  border: 1px dashed var(--cyan);
  padding: 8px 15px;
  margin: 0 15px 10px 15px;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
}
.message {
  margin-bottom: 15px;
  padding: 12px 16px;
  border-radius: 8px;
  max-width: 80%;
}
.message.user {
  background: rgba(212,175,55,0.15);
  align-self: flex-end;
  margin-left: auto;
  border: 1px solid var(--cyan);
}
.message.assistant {
  background: var(--hull);
  align-self: flex-start;
  border: 1px solid var(--wire);
}
.msg-img {
  max-width: 250px;
  border-radius: 6px;
  margin-top: 8px;
  border: 1px solid var(--wire);
}
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--deep);
  border: 1px solid var(--cyan);
  padding: 25px;
  border-radius: 8px;
  width: 100%;
  max-width: 450px;
}
</style>
</head>

  </div>
</div>
