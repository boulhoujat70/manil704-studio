<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANIL704 STUDIO — Central Intelligence</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --void: #050505;
  --deep: #0D0D0D;
  --hull: #121212;
  --cyan: #D4AF37; 
  --text: #E5E5E5;
  --text-bright: #FFFFFF;
  --wire: #332C1F;
  --danger: #FF3366;
  --success: #00ff9d;
}

html, body {
  height: 100%;
  margin: 0;
  background: var(--void);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
}

/* HEADER */
#voanh-header {
  background: var(--deep);
  border-bottom: 1px solid rgba(212,175,55,0.2);
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
  z-index: 10;
}
.brand-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 900;
  color: var(--text-bright);
  letter-spacing: 4px;
}
.hud-btn {
  background: var(--hull);
  border: 1px solid rgba(212,175,55,0.3);
  color: var(--cyan);
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.2s;
}
.hud-btn:hover {
  background: #1a1a1a;
  border-color: var(--cyan);
}
.status-pill {
  font-size: 11px;
  font-weight: 600;
  padding: 5px 10px;
  border-radius: 20px;
  background: #1a1a1a;
  border: 1px solid #333;
  color: #777;
}
.status-pill.active {
  border-color: rgba(0,255,157,0.4);
  color: var(--success);
  background: rgba(0, 255, 157, 0.1);
}

/* MAIN LAYOUT */
#studio-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
}

/* CHAT CONTAINER */
#chat-container {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--void);
  overflow-y: auto;
  padding: 20px;
  min-height: 0;
}

.welcome-banner {
  text-align: center;
  margin: auto;
  padding: 20px;
  max-width: 550px;
}
.wv-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 42px;
  font-weight: 900;
  color: var(--text-bright);
  text-shadow: 0 0 20px rgba(212,175,55,0.4);
}

#msg-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
  padding-bottom: 40px;
}

.message {
  padding: 15px 20px;
  border-radius: 8px;
  max-width: 85%;
  line-height: 1.6;
  word-wrap: break-word;
}
.message.user {
  background: rgba(212,175,55,0.08);
  align-self: flex-end;
  border: 1px solid rgba(212,175,55,0.3);
  color: var(--text-bright);
}
.message.assistant {
  background: var(--hull);
  align-self: flex-start;
  border: 1px solid var(--wire);
}

.msg-img {
  max-width: 100%;
  max-height: 300px;
  border-radius: 6px;
  margin-top: 10px;
  border: 1px solid var(--wire);
}

/* INPUT AREA AT BOTTOM */
#input-area {
  background: var(--deep);
  border-top: 1px solid rgba(212,175,55,0.2);
  padding: 15px 20px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-shrink: 0;
  z-index: 10;
}
#user-input {
  flex: 1;
  background: var(--hull);
  border: 1px solid var(--wire);
  color: #fff;
  padding: 12px 18px;
  border-radius: 6px;
  outline: none;
  font-size: 14px;
}
#user-input:focus {
  border-color: var(--cyan);
}
.file-btn {
  background: var(--hull);
  border: 1px solid rgba(212,175,55,0.3);
  color: var(--cyan);
  font-size: 18px;
  width: 46px;
  height: 46px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
#send-btn {
  background: var(--cyan);
  color: #000;
  font-weight: 700;
  border: none;
  padding: 12px 24px;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 1px;
}
#send-btn:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

.file-preview {
  background: #121212;
  border: 1px dashed var(--cyan);
  padding: 10px 20px;
  margin: 10px 20px 0 20px;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
  flex-shrink: 0;
}

/* MODAL CONTAINER */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5,5,5,0.9);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
  backdrop-filter: blur(6px);
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--deep);
  border: 1px solid var(--cyan);
  padding: 30px;
  border-radius: 8px;
  width: 100%;
  max-width: 480px;
}
</style>
</head>
<body>

<header id="voanh-header">
  <div class="brand">
    <span class="brand-name">MANIL704</span>
  </div>
  <div style="display:flex; gap:15px; align-items:center;">
    <select id="model-select" style="background:#121212; color:#fff; border:1px solid #332C1F; font-size:12px; padding:6px 10px; border-radius:4px; outline:none; cursor:pointer;">
      <option value="mistral-large-2512">🔥 Mistral Large (Texte / Scripts)</option>
      <option value="pixtral-12b-2409">👁 Pixtral Vision (Images / Stats)</option>
    </select>
    <span class="status-pill" id="api-status">OFFLINE</span>
    <button class="hud-btn" id="open-api-modal">⬡ API KEY</button>
  </div>
</header>

<div id="studio-layout">
  <main id="chat-container">
    <div class="welcome-banner" id="welcome">
      <div class="wv-logo">MANIL704</div>
      <p style="color: var(--cyan); letter-spacing: 2px; font-size: 11px; margin-top: 5px; font-weight:600;">CENTRAL INTELLIGENCE STUDIO</p>
      <p style="margin-top: 25px; color: #b3b3b3; font-size: 14px; line-height: 1.7;">
        Affichage corrigé. Ton espace de lecture est maintenant totalement dégagé. Rédige tes scripts de plus de 61 secondes ou analyse tes données de diffusion ici.
      </p>
    </div>
    <div id="msg-list"></div>
  </main>
</div>

<div id="preview-bar" class="file-preview" style="display: none;">
  <span>📎 Image prête pour l'analyse : <strong id="file-name" style="color:var(--cyan)"></strong></span>
  <button id="btn-clear-file" style="background:none; border:none; color:var(--danger); font-weight:600; cursor:pointer;">Retirer</button>
</div>

<div id="input-area">
  <button class="file-btn" id="trigger-file" title="Ajouter une image (Stats/Affiches)">📎</button>
  <input type="file" id="file-input" accept="image/*" style="display:none">
  <input type="text" id="user-input" placeholder="Transmettez vos consignes, collez un résumé de Drama ou commentez une image...">
  <button id="send-btn">SEND ▶</button>
</div>

<div class="modal-overlay" id="api-modal">
  <div class="modal-box">
    <h5 style="color: var(--cyan); font-family: 'Orbitron'; margin-bottom: 15px; font-weight: 700; letter-spacing:1px;">🔑 CLÉ API MISTRAL AI</h5>
    <input type="password" id="api-key-input" style="width:100%; background:#121212; color:#fff; border:1px solid #332C1F; padding:12px; border-radius:6px; outline:none; font-size:14px;" placeholder="sk-...">
    <div style="display:flex; gap:12px; margin-top:25px; justify-content: flex-end;">
      <button class="hud-btn" id="close-api-modal" style="color:#aaa; border-color:#333;">Fermer</button>
      <button class="hud-btn" id="save-api-key" style="background:var(--cyan); color:#000; font-weight:600; border-color:var(--cyan);">ACTIVER</button>
    </div>
  </div>
</div>

<script>
let state = { apiKey: localStorage.getItem('manil_key'), messages: [], attachedImg: null };

const $ = s => document.querySelector(s);

// Sync de l'état de la clé au chargement
if (state.apiKey) {
  $("#api-status").classList.add("active");
  $("#api-status").innerHTML = "● ONLINE";
}

// Modal actions
$("#open-api-modal").onclick = () => {
  if (state.apiKey) $("#api-key-input").value = state.apiKey;
  $("#api-modal").classList.add("active");
};
$("#close-api-modal").onclick = () => $("#api-modal").classList.remove("active");

$("#save-api-key").onclick = () => {
  const k = $("#api-key-input").value.trim();
  if (!k) return;
  localStorage.setItem('manil_key', k);
  state.apiKey = k;
  $("#api-status").classList.add("active");
  $("#api-status").innerHTML = "● ONLINE";
  $("#api-modal").classList.remove("active");
