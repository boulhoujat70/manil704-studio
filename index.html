<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANIL704 STUDIO</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --void: #050505;
  --deep: #0D0D0D;
  --hull: #121212;
  --cyan: #D4AF37; 
  --text: #E5E5E5;
  --text-bright: #FFFFFF;
  --wire: #332C1F;
}
body {
  font-family: 'Exo 2', sans-serif;
  background: var(--void);
  color: var(--text);
  height: 100%;
  display: flex;
  flex-direction: column;
  margin: 0;
}
#voanh-header {
  background: var(--deep);
  border-bottom: 1px solid rgba(212,175,55,0.2);
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
}
.brand-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 900;
  color: var(--text-bright);
  letter-spacing: 4px;
}
.hud-btn {
  background: var(--hull);
  border: 1px solid rgba(212,175,55,0.3);
  color: var(--cyan);
  font-size: 12px;
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
}
#chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 30px 20px;
  min-height: calc(100vh - 140px);
}
.welcome-banner {
  text-align: center;
  margin-top: 50px;
}
.wv-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 42px;
  font-weight: 900;
  color: var(--text-bright);
  text-shadow: 0 0 20px rgba(212,175,55,0.4);
}
#input-area {
  background: var(--deep);
  border-top: 1px solid rgba(212,175,55,0.2);
  padding: 15px;
  display: flex;
  gap: 10px;
}
#user-input {
  flex: 1;
  background: var(--hull);
  border: 1px solid var(--wire);
  color: #fff;
  padding: 10px 15px;
  border-radius: 6px;
  outline: none;
}
#send-btn {
  background: var(--cyan);
  color: #000;
  font-weight: 700;
  border: none;
  padding: 10px 20px;
  border-radius: 6px;
  cursor: pointer;
}
.message {
  margin-bottom: 15px;
  padding: 12px 16px;
  border-radius: 8px;
  max-width: 80%;
}
.message.user {
  background: rgba(212,175,55,0.15);
  align-self: flex-end;
  margin-left: auto;
  border: 1px solid var(--cyan);
}
.message.assistant {
  background: var(--hull);
  align-self: flex-start;
  border: 1px solid var(--wire);
}
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 1000;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--deep);
  border: 1px solid var(--cyan);
  padding: 25px;
  border-radius: 8px;
  width: 100%;
  max-width: 450px;
}
</style>
</head>
<body>

<header id="voanh-header">
  <div class="brand">
    <span class="brand-name">MANIL704</span>
  </div>
  <div>
    <button class="hud-btn" id="open-api-modal">⬡ API KEY</button>
  </div>
</header>

<main id="chat-container">
  <div class="welcome-banner" id="welcome">
    <div class="wv-logo">MANIL704</div>
    <p style="color: var(--cyan); letter-spacing: 2px; font-size: 11px; margin-top: 5px;">CENTRAL INTELLIGENCE STUDIO</p>
    <p style="margin-top: 20px; color: #aaa; font-size: 14px; max-width: 450px; margin-left: auto; margin-right: auto;">
      Ton espace privé pour structurer tes hooks viraux, découper tes mini-séries de plus de 61 secondes et maximiser ta monétisation TikTok.
    </p>
  </div>
  <div id="msg-list" style="display: flex; flex-direction: column;"></div>
</main>

<div id="input-area">
  <input type="text" id="user-input" placeholder="Transmets tes consignes d'optimisation (hooks, scripts)...">
  <button id="send-btn">SEND ▶</button>
</div>

<div class="modal-overlay" id="api-modal">
  <div class="modal-box">
    <h5 style="color: var(--cyan); font-family: 'Orbitron'; margin-bottom: 15px;">🔑 CLÉ API MISTRAL</h5>
    <input type="password" id="api-key-input" class="form-control" style="background:#121212; color:#fff; border:1px solid #332C1F;" placeholder="sk-...">
    <div style="display:flex; gap:10px; margin-top:20px; justify-content: flex-end;">
      <button class="hud-btn" id="close-api-modal" style="color:#aaa; border-color:#333;">Fermer</button>
      <button class="hud-btn" id="save-api-key">ACTIVER</button>
    </div>
  </div>
</div>

<script>
let state = { apiKey: localStorage.getItem('manil_key'), messages: [] };

const $ = s => document.querySelector(s);

$("#open-api-modal").onclick = () => {
  if (state.apiKey) $("#api-key-input").value = state.apiKey;
  $("#api-modal").classList.add("active");
};
$("#close-api-modal").onclick = () => $("#api-modal").classList.remove("active");

$("#save-api-key").onclick = () => {
  const k = $("#api-key-input").value.trim();
  if (!k) return;
  localStorage.setItem('manil_key', k);
  state.apiKey = k;
  $("#api-modal").classList.remove("active");
  toast("Clé API connectée !");
};

async function sendMessage() {
  const txt = $("#user-input").value.trim();
  if (!txt) return;
  if (!state.apiKey) { $("#api-modal").classList.add("active"); return; }

  $("#welcome").style.display = "none";
  state.messages.push({ role: "user", content: txt });
  render();
  $("#user-input").value = "";

  const list = $("#msg-list");
  const typing = document.createElement("div");
  typing.className = "message assistant";
  typing.textContent = "MANIL704 Studio analyse...";
  list.appendChild(typing);

  try {
    const res = await fetch("https://api.mistral.ai/v1/chat/completions", {
      method: "POST",
      headers: { "Authorization": `Bearer ${state.apiKey}`, "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "mistral-large-2512",
        messages: [{ role: "system", content: "Tu es MANIL704 Studio Intelligence. Aide l'utilisateur à créer des scripts, des descriptions et des hooks percutants de plus de 61 secondes pour ses vidéos et ses Lives TikTok." }, ...state.messages]
      })
    });
    typing.remove();
    if (!res.ok) throw new Error();
    const data = await res.json();
    state.messages.push({ role: "assistant", content: data.choices[0].message.content });
    render();
  } catch(e) {
    typing.textContent = "Erreur de connexion avec l'API Mistral. Vérifie ta clé.";
  }
}

function render() {
  $("#msg-list").innerHTML = state.messages.map(m => `
    <div class="message ${m.role}">
      <div style="font-size:10px; color:var(--cyan); margin-bottom:4px; font-weight:600;">${m.role==='user'?'▸ UNIQUE SCRIPT':'▸ STUDIO INTELLIGENCE'}</div>
      <div>${m.content}</div>
    </div>
  `).join('');
  $("#chat-container").scrollTop = $("#chat-container").scrollHeight;
}

function toast(m) {
  const t = document.createElement("div");
  t.style = "position:fixed; bottom:80px; right:20px; background:#121212; border:1px solid var(--cyan); padding:10px 20px; border-radius:4px; z-index:2000; font-size:12px;";
  t.textContent = m; document.body.appendChild(t); setTimeout(() => t.remove(), 2500);
}

$("#send-btn").onclick = sendMessage;
$("#user-input").onkeydown = e => { if (e.key === "Enter") sendMessage(); };
</script>
</body>
</html>
