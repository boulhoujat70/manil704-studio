<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MANIL704 STUDIO — Central Intelligence</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Exo+2:wght@400;600&display=swap" rel="stylesheet">
<style>
:root {
  --void: #050505;
  --deep: #0D0D0D;
  --hull: #121212;
  --cyan: #D4AF37; 
  --text: #E5E5E5;
  --text-bright: #FFFFFF;
  --wire: #332C1F;
  --danger: #FF3366;
  --success: #00ff9d;
}

html, body {
  height: 100%;
  margin: 0;
  background: var(--void);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  overflow: hidden;
}

body {
  display: flex;
  flex-direction: column;
}

/* HEADER */
#voanh-header {
  background: var(--deep);
  border-bottom: 1px solid rgba(212,175,55,0.2);
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
}
.brand-name {
  font-family: 'Orbitron', sans-serif;
  font-size: 20px;
  font-weight: 900;
  color: var(--text-bright);
  letter-spacing: 4px;
}
.hud-btn {
  background: var(--hull);
  border: 1px solid rgba(212,175,55,0.3);
  color: var(--cyan);
  font-size: 12px;
  padding: 8px 14px;
  border-radius: 4px;
  cursor: pointer;
}
.hud-btn:hover {
  background: #1a1a1a;
  border-color: var(--cyan);
}
.status-pill {
  font-size: 11px;
  font-weight: 600;
  padding: 6px 12px;
  border-radius: 20px;
  background: #1a1a1a;
  border: 1px solid #333;
  color: #777;
}
.status-pill.active {
  border-color: rgba(0,255,157,0.4);
  color: var(--success);
  background: rgba(0, 255, 157, 0.1);
}

/* MAIN LAYOUT */
#chat-container {
  flex: 1;
  background: var(--void);
  overflow-y: auto;
  padding: 20px;
  display: flex;
  flex-direction: column;
}

.welcome-banner {
  text-align: center;
  margin: auto;
  padding: 20px;
  max-width: 550px;
}
.wv-logo {
  font-family: 'Orbitron', sans-serif;
  font-size: 42px;
  font-weight: 900;
  color: var(--text-bright);
  text-shadow: 0 0 20px rgba(212,175,55,0.4);
}

#msg-list {
  display: flex;
  flex-direction: column;
  gap: 20px;
  width: 100%;
  max-width: 900px;
  margin: 0 auto;
}

.message {
  padding: 15px 20px;
  border-radius: 8px;
  max-width: 85%;
  line-height: 1.6;
  word-wrap: break-word;
}
.message.user {
  background: rgba(212,175,55,0.08);
  align-self: flex-end;
  border: 1px solid rgba(212,175,55,0.3);
  color: var(--text-bright);
}
.message.assistant {
  background: var(--hull);
  align-self: flex-start;
  border: 1px solid var(--wire);
}
.msg-img {
  max-width: 100%;
  max-height: 250px;
  border-radius: 6px;
  margin-top: 10px;
}

/* INPUT AREA AT BOTTOM */
#input-area {
  background: var(--deep);
  border-top: 1px solid rgba(212,175,55,0.2);
  padding: 15px 20px;
  display: flex;
  gap: 12px;
  align-items: center;
  flex-shrink: 0;
}
#user-input {
  flex: 1;
  background: var(--hull);
  border: 1px solid var(--wire);
  color: #fff;
  padding: 12px 18px;
  border-radius: 6px;
  outline: none;
  font-size: 14px;
}
#user-input:focus {
  border-color: var(--cyan);
}
.file-btn {
  background: var(--hull);
  border: 1px solid rgba(212,175,55,0.3);
  color: var(--cyan);
  font-size: 18px;
  width: 46px;
  height: 46px;
  border-radius: 6px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
}
#send-btn {
  background: var(--cyan);
  color: #000;
  font-weight: 700;
  border: none;
  padding: 12px 24px;
  border-radius: 6px;
  cursor: pointer;
  font-family: 'Orbitron', sans-serif;
  letter-spacing: 1px;
}

.file-preview {
  background: #121212;
  border: 1px dashed var(--cyan);
  padding: 10px 20px;
  margin: 10px 20px 0 20px;
  border-radius: 6px;
  display: flex;
  justify-content: space-between;
  font-size: 13px;
}

/* MODAL POPUP */
.modal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5,5,5,0.95);
  display: none;
  justify-content: center;
  align-items: center;
  z-index: 2000;
}
.modal-overlay.active { display: flex; }
.modal-box {
  background: var(--deep);
  border: 1px solid var(--cyan);
  padding: 30px;
  border-radius: 8px;
  width: 100%;
  max-width: 420px;
}
</style>
</head>

  <div class="brand">
    <span class="brand-name">MANIL704</span>
  </div>
  <div style="display:flex; gap:12px; align-items:center;">
    <select id="model-select" style="background:#121212; color:#fff; border:1px solid #332C1F; font-size:12px; padding:6px; border-radius:4px; outline:none;">
      <option value="mistral-large-2512">🔥 Mistral Large (Texte)</option>
      <option value="pixtral-12b-2409">👁 Pixtral Vision (Images)</option>
    </select>

    <button class="hud-btn" id="open-api-modal">⬡ API KEY</button>
  </div>
</header>
