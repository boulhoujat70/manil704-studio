<!DOCTYPE html>
<html lang="fr" data-theme="cyber">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>MANIL704 STUDIO — Central Intelligence</title>

<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" href="https://cdn-icons-png.flaticon.com/512/8943/8943377.png">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════
   MANIL704 DESIGN SYSTEM — DARK LUXURY & OR
   ═══════════════════════════════════════════ */
:root {
  --void: #050505;
  --deep: #0D0D0D;
  --hull: #121212;
  --plate: #1A1A1A;
  --grid: #221F1A;
  --wire: #332C1F;
  --cyan: #D4AF37; 
  --cyan-dim: rgba(212, 175, 55, 0.12);
  --cyan-glow: rgba(212, 175, 55, 0.35);
  --text: #E5E5E5;
  --text-bright: #FFFFFF;
  --text-dim: #7A7265;
  --danger: #ff3366;
  --success: #00ff9d;
  --font-display: 'Orbitron', monospace;
  --font-mono: 'Share Tech Mono', monospace;
  --font-body: 'Exo 2', sans-serif;
  --hud-border: 1px solid rgba(212,175,55,0.2);
  --scanline: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(212,175,55,0.015) 2px, rgba(212,175,55,0.015) 4px);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: var(--font-body);
  background: var(--void);
  color: var(--text);
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  background-image: var(--scanline), radial-gradient(ellipse 80% 50% at 50% -20%, rgba(212,175,55,0.06) 0%, transparent 60%);
}

#studio-header {
  background: var(--deep);
  border-bottom: var(--hud-border);
  height: 60px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  flex-shrink: 0;
  z-index: 10;
}
.brand-name {
  font-family: var(--font-display);
  font-size: 20px;
  font-weight: 900;
  color: var(--text-bright);
  letter-spacing: 4px;
  text-shadow: 0 0 15px rgba(212,175,55,0.4);
}
.hud-select {
  background: var(--hull);
  border: var(--hud-border);
  color: var(--text);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 10px;
  border-radius: 4px;
  outline: none;
  max-width: 160px;
}
.hud-btn {
  background: var(--hull);
  border: var(--hud-border);
  color: var(--cyan);
  font-family: var(--font-mono);
  font-size: 11px;
  padding: 6px 12px;
  border-radius: 4px;
  cursor: pointer;
}
.status-pill {
  font-family: var(--font-mono);
  font-size: 10px;
  padding: 5px 10px;
  border-radius: 20px;
  background: var(--hull);
  border: 1px solid #333;
  color: #777;
}
.status-pill.active {
  border-color: rgba(0,255,157,0.4);
  color: var(--success);
  background: rgba(0, 255, 157, 0.1);
}

#main-layout {
  display: flex;
  flex: 1;
  overflow: hidden;
  position: relative;
}

#agents-sidebar {
  width: 260px;
  background: var(--deep);
  border-right: var(--hud-border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  transition: transform 0.3s ease;
  z-index: 100;
}
.sidebar-title {
  font-family: var(--font-display);
  font-size: 11px;
  color: var(--cyan);
  padding: 15px;
  border-bottom: 1px solid var(--wire);
  letter-spacing: 1px;
}
.agents-list {
  flex: 1;
  overflow-y: auto;
  padding: 10px;
}
.agent-item {
  padding: 8px 12px;
  background: var(--hull);
  border: 1px solid var(--wire);
  border-radius: 4px;
  margin-bottom: 8px;
  font-size: 12px;
  font-family: var(--font-mono);
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.agent-tag {
  font-size: 9px;
  background: var(--cyan-dim);
  border: 1px solid rgba(212,175,55,0.4);
  color: var(--cyan);
  padding: 1px 4px;
  border-radius: 2px;
}

#chat-space {
  flex: 1;
  display: flex;
  flex-direction: column;
  background: var(--void);
  overflow: hidden;
}
#chat-container {
  flex: 1;
  overflow-y: auto;
  padding: 15px;
}
#msg-list {
  display: flex;
  flex-direction: column;
  gap: 15px;
  max-width: 850px;
  margin: 0 auto;
}
.message {
  padding: 12px 16px;
  border-radius: 8px;
  max-width: 85%;
  line-height: 1.5;
  font-size: 14px;
}
.
