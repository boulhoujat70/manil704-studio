<style>
  /* ═══════════════════════════════════════════
   MANIL704 DESIGN SYSTEM — DARK LUXURY / OR
   ═══════════════════════════════════════════ */
:root {
  --void: #050505;
  --deep: #0D0D0D;
  --hull: #121212;
  --plate: #1A1A1A;
  --grid: #221F1A;
  --wire: #332C1F;
  --cyan: #D4AF37; 
  --cyan-dim: rgba(212, 175, 55, 0.12);
  --cyan-glow: rgba(212, 175, 55, 0.35);
  --neon: #FF6B35; 
  --neon-dim: rgba(255, 107, 53, 0.12);
  --plasma: #FF8A00;
  --plasma-dim: rgba(255, 138, 0, 0.15);
  --violet: #7c3aed;
  --violet-dim: rgba(124, 58, 237, 0.2);
  --gold: #f59e0b;
  --text: #E5E5E5;
  --text-bright: #FFFFFF;
  --text-dim: #7A7265;
  --text-code: #D4AF37;
  --danger: #ff3366;
  --success: #00ff9d;
  --warning: #D4AF37;
  --font-display: 'Orbitron', monospace;
  --font-mono: 'Share Tech Mono', monospace;
  --font-body: 'Exo 2', sans-serif;
  --r: 6px;
  --r-lg: 12px;
  --border: 1px solid var(--wire);
  --border-cyan: 1px solid rgba(212,175,55,0.3);
  --transition: all 0.2s cubic-bezier(0.4,0,0.2,1);
  --scanline: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(212,175,55,0.015) 2px, rgba(212,175,55,0.015) 4px);
  --hud-border: 1px solid rgba(212,175,55,0.2);
}

/* RESET */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 4px; height: 4px; }
::-webkit-scrollbar-track { background: var(--void); }
::-webkit-scrollbar-thumb { background: var(--wire); border-radius: 2px; }
::-webkit-scrollbar-thumb:hover { background: var(--cyan); }

/* GLOBAL */
html, body {
  height: 100%;
